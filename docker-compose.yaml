services:

  # ─── PostgreSQL ─────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: supporthub
      POSTGRES_USER: supporthub
      POSTGRES_PASSWORD: supporthub
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U supporthub"]
      interval: 10s
      timeout: 5s
      retries: 5
    # No host port binding — internal only. Coolify's proxy handles external routing.

  # ─── API ────────────────────────────────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://supporthub:supporthub@db:5432/supporthub
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      NODE_ENV: production
      PORT: 3001
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "3001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ─── Migration job ──────────────────────────────────────────────────────────
  # Runs once on startup to apply the schema; exits 0 when done
  migrate:
    build:
      context: ./api
      dockerfile: Dockerfile
    command: ["node", "-e", "import('./dist/db/migrate.js')"]
    environment:
      DATABASE_URL: postgres://supporthub:supporthub@db:5432/supporthub
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  # ─── Frontend ───────────────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    expose:
      - "80"

volumes:
  db_data:
