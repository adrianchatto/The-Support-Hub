services:

  # ─── PostgreSQL ─────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-supporthub}
      POSTGRES_USER: ${POSTGRES_USER:-supporthub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-supporthub}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"   # exposed for local dev; remove in production

  # ─── API ────────────────────────────────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-supporthub}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-supporthub}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?ANTHROPIC_API_KEY is required}
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3001
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:80}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ─── Migration job ──────────────────────────────────────────────────────────
  # Runs once on startup to apply the schema; exits 0 when done
  migrate:
    build:
      context: ./api
      dockerfile: Dockerfile
    command: ["node", "-e", "import('./dist/db/migrate.js')"]
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-supporthub}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-supporthub}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  # ─── Frontend ───────────────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3001}
    depends_on:
      - api
    ports:
      - "80:80"

volumes:
  db_data:
